# Render Blueprint для FitApp.Api.
# База данных — Neon PostgreSQL (бесплатно, постоянное хранилище).
# CONNECTION STRING задаётся вручную через Render Dashboard →
# fitapp-api → Environment → DATABASE_URL.
#
# Как получить строку подключения:
#   1. Зарегистрируйся на neon.tech
#   2. New Project → выбери регион (eu-central-1 ближе к РФ)
#   3. Dashboard → Connection string → скопируй «Pooler» URL (sslmode=require)
#   4. Вставь в Render Dashboard → fitapp-api → Environment → DATABASE_URL
services:
  - type: web
    name: fitapp-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./FitApp.Api/Dockerfile
    dockerContext: ./FitApp.Api
    healthCheckPath: /health
    envVars:
      # PostgreSQL connection string (Neon или другой Postgres-провайдер).
      # Формат: postgresql://user:pass@host/db?sslmode=require
      # Вводится вручную в Render Dashboard (sync:false — не хранится в git).
      - key: DATABASE_URL
        sync: false
      # Render пробрасывает $PORT → ASP.NET слушает на нём
      - key: ASPNETCORE_URLS
        value: http://+:$PORT
      # JWT-секрет — тоже вводится вручную
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        value: FitApp.Api
      - key: Jwt__Audience
        value: FitApp
      - key: Jwt__ExpirationDays
        value: "30"
